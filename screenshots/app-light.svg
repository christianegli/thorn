<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780">
  <!-- Window chrome -->
  <rect width="1200" height="780" rx="12" fill="#f0ede8"/>
  <rect width="1200" height="36" rx="12" fill="#e8e4de"/>
  <rect y="24" width="1200" height="12" fill="#e8e4de"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#28ca42"/>

  <!-- Writing area -->
  <rect x="0" y="36" width="1200" height="744" fill="#f6f1e9"/>

  <!-- Title -->
  <rect x="240" y="120" width="420" height="30" rx="2" fill="#1a1a1a" opacity="0.85"/>

  <!-- Chapter -->
  <rect x="240" y="168" width="220" height="14" rx="2" fill="#888" opacity="0.45"/>

  <!-- Body -->
  <rect x="240" y="216" width="640" height="12" rx="2" fill="#333" opacity="0.55"/>
  <rect x="240" y="236" width="620" height="12" rx="2" fill="#333" opacity="0.55"/>
  <rect x="240" y="256" width="600" height="12" rx="2" fill="#333" opacity="0.55"/>
  <rect x="240" y="276" width="590" height="12" rx="2" fill="#333" opacity="0.55"/>
  <rect x="240" y="296" width="380" height="12" rx="2" fill="#333" opacity="0.55"/>

  <rect x="240" y="332" width="635" height="12" rx="2" fill="#333" opacity="0.55"/>
  <rect x="240" y="352" width="612" height="12" rx="2" fill="#333" opacity="0.55"/>
  <rect x="240" y="372" width="580" height="12" rx="2" fill="#333" opacity="0.55"/>

  <!-- Cursor -->
  <rect x="240" y="393" width="2" height="16" rx="1" fill="#6b48ff"/>

  <!-- Left panel (documents) peeking -->
  <rect x="0" y="36" width="200" height="744" rx="0" fill="#ede9e0" opacity="0.95"/>
  <rect x="200" y="36" width="1" height="744" fill="#d9d4ca"/>

  <!-- Panel items -->
  <rect x="16" y="60" width="140" height="11" rx="2" fill="#555" opacity="0.5"/>
  <rect x="16" y="90" width="160" height="28" rx="4" fill="#6b48ff" opacity="0.15"/>
  <rect x="24" y="99" width="110" height="10" rx="2" fill="#6b48ff" opacity="0.9"/>
  <rect x="16" y="130" width="150" height="10" rx="2" fill="#888" opacity="0.4"/>
  <rect x="16" y="152" width="130" height="10" rx="2" fill="#888" opacity="0.4"/>
  <rect x="16" y="174" width="145" height="10" rx="2" fill="#888" opacity="0.4"/>

  <!-- Bottom bar -->
  <rect x="0" y="728" width="1200" height="52" fill="#ede9e0"/>
  <rect x="0" y="728" width="1200" height="1" fill="#d0ccc4"/>

  <!-- Word count -->
  <rect x="220" y="742" width="65" height="24" rx="4" fill="#e0dbd3"/>
  <rect x="228" y="751" width="49" height="8" rx="2" fill="#888"/>

  <rect x="297" y="742" width="55" height="24" rx="4" fill="#e0dbd3"/>
  <rect x="305" y="751" width="39" height="8" rx="2" fill="#888"/>

  <!-- Theme / settings right -->
  <circle cx="1120" cy="754" r="10" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="1120" cy="754" r="5" fill="#aaa"/>
  <rect x="1150" y="744" width="24" height="24" rx="4" fill="#e0dbd3"/>
  <rect x="1156" y="751" width="12" height="2" rx="1" fill="#aaa"/>
  <rect x="1156" y="756" width="12" height="2" rx="1" fill="#aaa"/>
  <rect x="1156" y="761" width="12" height="2" rx="1" fill="#aaa"/>
</svg>
