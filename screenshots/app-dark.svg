<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Georgia:ital,wght@0,400;1,400&amp;display=swap');
    </style>
  </defs>

  <!-- Window chrome -->
  <rect width="1200" height="780" rx="12" fill="#0d0d0d"/>
  <rect width="1200" height="36" rx="0" fill="#1a1a1a"/>
  <rect width="1200" height="36" rx="12" fill="#1a1a1a"/>
  <rect y="24" width="1200" height="12" fill="#1a1a1a"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#28ca42"/>

  <!-- Writing area -->
  <rect x="0" y="36" width="1200" height="744" fill="#0d0d0d"/>

  <!-- Cursor line indicator (left edge subtle) -->
  <rect x="0" y="36" width="3" height="744" fill="#6b48ff" opacity="0.4"/>

  <!-- Text content (simulated) -->
  <!-- Title line -->
  <rect x="240" y="120" width="480" height="32" rx="2" fill="#f0f0f0" opacity="0.9"/>

  <!-- Subtitle / chapter -->
  <rect x="240" y="172" width="280" height="16" rx="2" fill="#888" opacity="0.5"/>

  <!-- Body paragraphs -->
  <rect x="240" y="224" width="640" height="13" rx="2" fill="#c8c8c8" opacity="0.7"/>
  <rect x="240" y="245" width="620" height="13" rx="2" fill="#c8c8c8" opacity="0.7"/>
  <rect x="240" y="266" width="600" height="13" rx="2" fill="#c8c8c8" opacity="0.7"/>
  <rect x="240" y="287" width="590" height="13" rx="2" fill="#c8c8c8" opacity="0.7"/>
  <rect x="240" y="308" width="410" height="13" rx="2" fill="#c8c8c8" opacity="0.7"/>

  <!-- Blank line -->

  <rect x="240" y="346" width="638" height="13" rx="2" fill="#c8c8c8" opacity="0.7"/>
  <rect x="240" y="367" width="614" height="13" rx="2" fill="#c8c8c8" opacity="0.7"/>
  <rect x="240" y="388" width="580" height="13" rx="2" fill="#c8c8c8" opacity="0.7"/>

  <!-- Cursor blink -->
  <rect x="240" y="409" width="2" height="16" rx="1" fill="#6b48ff"/>

  <!-- Annotation bubble (right side) -->
  <rect x="920" y="228" width="220" height="64" rx="6" fill="#1e1e2e" stroke="#6b48ff" stroke-width="1" opacity="0.9"/>
  <rect x="934" y="240" width="120" height="8" rx="2" fill="#aaa" opacity="0.6"/>
  <rect x="934" y="256" width="190" height="8" rx="2" fill="#888" opacity="0.5"/>
  <rect x="934" y="270" width="140" height="8" rx="2" fill="#888" opacity="0.5"/>
  <!-- annotation connector dot -->
  <circle cx="916" cy="260" r="3" fill="#6b48ff"/>
  <line x1="916" y1="260" x2="920" y2="260" stroke="#6b48ff" stroke-width="1"/>

  <!-- Bottom status bar -->
  <rect x="0" y="728" width="1200" height="52" fill="#141414"/>
  <rect x="0" y="728" width="1200" height="1" fill="#2a2a2a"/>

  <!-- Status bar items -->
  <!-- Word count -->
  <rect x="32" y="742" width="60" height="24" rx="4" fill="#1e1e1e"/>
  <rect x="40" y="751" width="44" height="8" rx="2" fill="#666"/>

  <!-- Reading time -->
  <rect x="104" y="742" width="50" height="24" rx="4" fill="#1e1e1e"/>
  <rect x="112" y="751" width="34" height="8" rx="2" fill="#666"/>

  <!-- Right side: theme / settings -->
  <circle cx="1120" cy="754" r="10" fill="none" stroke="#555" stroke-width="1.5"/>
  <circle cx="1120" cy="754" r="5" fill="#555"/>
  <rect x="1150" y="744" width="24" height="24" rx="4" fill="#1e1e1e"/>
  <rect x="1156" y="751" width="12" height="2" rx="1" fill="#666"/>
  <rect x="1156" y="756" width="12" height="2" rx="1" fill="#666"/>
  <rect x="1156" y="761" width="12" height="2" rx="1" fill="#666"/>
</svg>
